services:
  tankpreise:
    image: ghcr.io/bannanenbaer/tankpreise-rss-feed:latest
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - tankpreise-data:/data
    environment:
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5000),3); s.close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tankpreise-data:
    driver: local
